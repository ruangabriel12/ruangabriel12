<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo</title>
    <!-- Simulação do Bootstrap Local -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> 
        body, html { height: 100%; margin: 0; }
        .bg-copa {
            background-color: #0a4d26; /* Cor reserva caso a imagem não carregue */
            background-image: url('img/FIFA-World-Cup-26.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            backdrop-filter: blur(5px);
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 10px;
        }
        #Cards { transition: all 0.5s ease; }
    </style>
</head>
<body>

    <div class="bg-copa">
        <div id="Cards" class="d-flex flex-row flex-wrap justify-content-center align-items-center">
            <!-- Card Original -->
            <div class="card" style="width: 22rem;">
                <img src="img/_vinicius_junior.png" class="card-img-top" alt="Vini Jr">
                <div class="card-body">
                    <h5 class="card-title">
                        <span>Vini JR.</span>
                        <span class="badge text-bg-secondary">9,5</span>
                    </h5>
                    <p class="card-text">
                        <strong>Nascimento:</strong> 12/07/2000<br>
                        <strong>Altura:</strong> 1,76 m<br>
                        <strong>Posição:</strong> Ponta-esquerda / Atacante<br>
                    </p>
                </div>
            </div>
        </div>

        <button onclick="add()" class="btn btn-primary mt-4" style="padding: 10px 20px;">
            Adicionar Novo Jogador
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
