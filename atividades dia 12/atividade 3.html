<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultado do Aluno</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 350px;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .campo {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #444;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0056b3;
    }

    #resultado {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      font-weight: bold;
      text-align: center;
    }

    .aprovado {
      background: #dbeafe;
      color: blue;
    }

    .exame {
      background: #dcfce7;
      color: green;
    }

    .reprovado {
      background: #fee2e2;
      color: red;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Resultado Final</h1>

    <div class="campo">
      <label for="nome">Nome do Aluno</label>
      <input type="text" id="nome" placeholder="Digite o nome">
    </div>

    <div class="campo">
      <label for="nota1">Nota 1</label>
      <input type="number" id="nota1" step="0.1">
    </div>

    <div class="campo">
      <label for="nota2">Nota 2</label>
      <input type="number" id="nota2" step="0.1">
    </div>

    <div class="campo">
      <label for="nota3">Nota 3</label>
      <input type="number" id="nota3" step="0.1">
    </div>

    <button id="calcular">Calcular Média</button>

    <div id="resultado"></div>
  </div>

  <script>
    const botao = document.getElementById("calcular");

    botao.addEventListener("click", () => {

      const nome = document.getElementById("nome").value;

      const nota1 = Number(document.getElementById("nota1").value);
      const nota2 = Number(document.getElementById("nota2").value);
      const nota3 = Number(document.getElementById("nota3").value);

      const resultado = document.getElementById("resultado");

      const media = (nota1 + nota2 + nota3) / 3;

      const mediaFormatada = media.toFixed(2);

      if (media >= 7 && media <= 10) {

        resultado.className = "aprovado";

        resultado.innerHTML = `
          ${nome} está APROVADO!<br>
          Média: ${mediaFormatada}
        `;

      } else if (media >= 4 && media < 7) {

        resultado.className = "exame";

        // Quanto falta para chegar em 10
        const falta = (10 - media).toFixed(2);

        resultado.innerHTML = `
          ${nome} está em EXAME.<br>
          Média: ${mediaFormatada}<br>
          Faltam ${falta} pontos para chegar em 10.
        `;

      } else {

        resultado.className = "reprovado";

        resultado.innerHTML = `
          ${nome} está REPROVADO.<br>
          Média: ${mediaFormatada}
        `;
      }

    });
  </script>

</body>
</html>
